<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content=""width=device-width, initial-scale="1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Title</title>
    </head>
    <body>
        <div id="addButton">Add to Storage</div>
        <input type="text" id="firstName">
        <input type="text" id="lastName">
        <div id="viewButton">View Storage</div>
        <div id="clearButton">Clear Storage</div>
        <script>
            const people = JSON.parse(localStorage.getItem("tester")) || {"first": "N/A", "last": "N/A"};
            document.getElementById("addButton").addEventListener('click', addToStorage);
            function addToStorage() {
                let tempFirst = document.getElementById("firstName").value;
                let tempLast = document.getElementById("lastName").value;
                let name = {"first" : tempFirst, "last" : tempLast};
                name = JSON.stringify(name)
                localStorage.setItem("tester", name);
            }
            document.getElementById("viewButton").addEventListener('click', viewStorage);
            function viewStorage() {
                let tempHolder = localStorage.getItem("tester") || people;
                console.log(tempHolder)
            }
            document.getElementById("clearButton").addEventListener('click', clearStorage);
            function clearStorage() {
                localStorage.clear();
            }
            
            
        </script>
    </body>
</html>
